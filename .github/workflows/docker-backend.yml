name: Build and push backend image

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - 'packages/common/**'
      - 'Dockerfile.backend'
      - '.github/workflows/docker-backend.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: allin-li/ts6-manager-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ghcr.io/allin-li/ts6-manager-backend:latest
            ghcr.io/allin-li/ts6-manager-backend:${{ github.sha }}
